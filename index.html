<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📊 Smart Finance Tracker</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #fdbb2d;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* --- Header --- */
        .app-header { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .profile-photo { 
            width: 50px; height: 50px; 
            border-radius: 15px; 
            background: rgba(255,255,255,0.2); 
            border: 2px solid rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; cursor: pointer;
        }

        .reward-tag {
            background: var(--accent);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 11px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .lang-top { 
            background: rgba(255,255,255,0.2); 
            border: 1px solid rgba(255,255,255,0.3); 
            color: white; border-radius: 10px; padding: 6px 8px; 
            font-size: 13px; outline: none;
        }
        .lang-top option { color: #000; }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: white; display: flex; justify-content: space-around;
            padding: 12px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            z-index: 1000; border-top-left-radius: 20px; border-top-right-radius: 20px;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 4px; cursor: pointer; color: var(--text-sub); transition: 0.3s; flex: 1;
        }
        .nav-item.active { color: var(--secondary); }
        .nav-icon { font-size: 20px; }
        .nav-text { font-size: 10px; font-weight: 600; }

        /* --- Layout --- */
        .content { padding: 20px; }
        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .balance-hero { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; padding: 30px 20px; border-radius: 25px; 
            text-align: center; margin-bottom: 25px;
        }

        /* --- Forms --- */
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: var(--text-sub); }
        input, select, textarea { 
            width: 100%; padding: 14px; border: 2px solid #edf2f7; 
            border-radius: 12px; font-size: 16px; outline: none;
            font-family: inherit;
        }
        .counter-group { display: flex; align-items: center; gap: 10px; }
        .c-btn { 
            width: 45px; height: 45px; border-radius: 10px; border: none; 
            background: #f1f5f9; font-size: 20px; cursor: pointer;
        }
        .btn-save { 
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer;
        }

        /* Modals */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; justify-content:center; align-items:center; backdrop-filter: blur(5px); padding: 20px; }
        .modal-content { background:white; width:90%; max-width:500px; border-radius:25px; padding:30px; text-align:center; }

        .btn-google {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px; background: white; border: 2px solid #4285f4;
            border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 20px;
            color: #4285f4;
        }

        .checkin-status { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .checkin-days { font-size: 36px; font-weight: bold; margin: 10px 0; }
        .checkin-progress { background: rgba(255,255,255,0.2); border-radius: 10px; height: 8px; margin: 15px 0; overflow: hidden; }
        .checkin-progress-bar { background: #10b981; height: 100%; transition: width 0.3s ease; }

        .loading { text-align: center; padding: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="user-info">
            <div class="profile-photo" id="headAv" onclick="showPage('profile')">👷</div>
            <div>
                <div id="headName" style="font-weight: 700; font-size: 16px;">User</div>
                <div id="headCode" style="font-size: 10px; opacity: 0.8;">EMP001</div>
            </div>
        </div>
        <div class="reward-tag" onclick="showPage('rewards')">🎁 REWARD</div>
        <select class="lang-top" id="topLang" onchange="setLang(this.value)">
            <option value="my">🇲🇲 MY</option>
            <option value="en">🇺🇸 EN</option>
            <option value="th">🇹🇭 TH</option>
        </select>
    </div>

    <div class="content">
        <div id="income" class="page active">
            <div class="card">
                <h3 style="margin-bottom:15px;" class="t-income">ဝင်ငွေထည့်သွင်းရန်</h3>
                <div class="form-group"><label>📅 <span class="t-date">ရက်စွဲ</span></label><input type="date" id="iDate"></div>
                <div class="form-group">
                    <label>⏰ <span class="t-hours">အလုပ်ချိန် (နာရီ)</span></label>
                    <div class="counter-group">
                        <button class="c-btn" onclick="step('iHours', -1)">-</button>
                        <input type="number" id="iHours" value="8">
                        <button class="c-btn" onclick="step('iHours', 1)">+</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>⏱️ <span class="t-ot">OT (နာရီ)</span></label>
                    <div class="counter-group">
                        <button class="c-btn" onclick="step('iOt', -0.5)">-</button>
                        <input type="number" id="iOt" value="0" step="0.5">
                        <button class="c-btn" onclick="step('iOt', 0.5)">+</button>
                    </div>
                </div>
                <div class="form-group"><label>💵 <span class="t-extra">အပိုဝင်ငွေ</span></label><input type="number" id="iExtra" value="0"></div>
                <button class="btn-save" onclick="saveData('income')">💾 <span class="t-save">သိမ်းဆည်းမည်</span></button>
            </div>
        </div>

        <div id="rewards" class="page">
            <div class="card" style="text-align: center;">
                <h2 style="margin-bottom: 10px;">🎁 Daily Check-in</h2>
                <div class="checkin-status">
                    <div class="checkin-days" id="checkinDays">0</div>
                    <div class="checkin-progress"><div class="checkin-progress-bar" id="checkinProgressBar" style="width: 0%"></div></div>
                </div>
                <div id="pointsDisplay" style="font-size: 24px; font-weight: bold; margin-bottom: 20px;">0 Points</div>
                <button class="btn-save" id="claimBtn" onclick="claimDailyReward()">🎁 Today Check-in</button>
                <p id="rewardMsg" style="margin-top: 15px; font-size: 12px; color: #b21f1f;"></p>
            </div>
        </div>

        <div id="profile" class="page">
            <div class="card">
                <h3 style="margin-bottom:15px;">ကိုယ်ရေးအချက်အလက်</h3>
                <div class="form-group"><label>အမည်</label><input type="text" id="pName"></div>
                <div class="form-group"><label>ကုတ်နံပါတ်</label><input type="text" id="pCode"></div>
                <div class="form-group"><label>တနေ့လုပ်အားခ</label><input type="number" id="pWage"></div>
                <div class="form-group"><label>OT နာရီခ</label><input type="number" id="pOt"></div>
                <div class="device-info" style="background:#f3f4f6; padding:10px; border-radius:8px; font-size:12px; margin-top:10px;">
                    <strong>Gmail:</strong> <span id="userEmail">Not logged in</span>
                </div>
                <button class="btn-save" style="margin-top:20px;" onclick="saveProfile()">💾 Update Profile</button>
                <button class="btn-save" style="margin-top:10px; background:#ef4444;" onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('income')">🏠<div class="nav-text">Income</div></div>
        <div class="nav-item" onclick="showPage('rewards')">🎁<div class="nav-text">Reward</div></div>
        <div class="nav-item" onclick="showPage('profile')">👤<div class="nav-text">Profile</div></div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:10px;">👋 Welcome!</h2>
            <div class="loading" id="loginLoading" style="display:none;"><div class="spinner"></div><p>ချိတ်ဆက်နေသည်...</p></div>
            <button class="btn-google" id="googleLoginBtn" onclick="loginWithGoogle()">Sign in with Gmail</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7T7WZg0fLGTw6ShqDHjOva-btNF6O1AM",
            authDomain: "seafood-oder.firebaseapp.com",
            databaseURL: "https://seafood-oder-default-rtdb.firebaseio.com",
            projectId: "seafood-oder",
            storageBucket: "seafood-oder.firebasestorage.app",
            messagingSenderId: "428949391732",
            appId: "1:428949391732:web:6aa0a31a4f4ba33765c421",
            measurementId: "G-GY9TRMQ359"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let records = JSON.parse(localStorage.getItem('f_recs')) || [];
        let profile = JSON.parse(localStorage.getItem('f_prof')) || { 
            name:'User', code:'EMP001', wage:375, ot:69, lang:'my', points: 0, checkinDays: 0, lastCheckin: '', email: ''
        };

        function loginWithGoogle() {
            document.getElementById('googleLoginBtn').style.display = 'none';
            document.getElementById('loginLoading').style.display = 'block';
            auth.signInWithRedirect(provider);
        }

        // Handle Login Result
        auth.getRedirectResult().then((result) => {
            if (result.user) {
                const user = result.user;
                // email ထဲက dot (.) ကို underscore (_) နဲ့ အစားထိုးပါတယ် (Firebase Key Error မတက်အောင်)
                const safeCode = user.email.split('@')[0].replace(/\./g, "_");
                
                profile.email = user.email;
                profile.name = user.displayName || 'User';
                profile.code = safeCode;

                db.ref('users/' + safeCode).once('value').then(snap => {
                    if (snap.exists()) {
                        const data = snap.val();
                        profile = data.profile || profile;
                        records = data.records || records;
                    }
                    localStorage.setItem('f_prof', JSON.stringify(profile));
                    localStorage.setItem('f_recs', JSON.stringify(records));
                    location.reload();
                });
            }
        });

        function syncToFirebase() {
            if(auth.currentUser) {
                const safeCode = auth.currentUser.email.split('@')[0].replace(/\./g, "_");
                db.ref('users/' + safeCode).set({ profile, records, lastUpdate: new Date().toISOString() });
            }
        }

        function saveData(type) {
            const date = document.getElementById('iDate').value;
            if(!date) return alert("Select date");
            const h = parseFloat(document.getElementById('iHours').value)||0;
            const o = parseFloat(document.getElementById('iOt').value)||0;
            const e = parseFloat(document.getElementById('iExtra').value)||0;
            const amt = (h/8 * profile.wage) + (o * profile.ot) + e;
            
            records.push({ id:Date.now(), type, date, amt, category:"Income", details:{ h, o, e } });
            localStorage.setItem('f_recs', JSON.stringify(records));
            syncToFirebase();
            alert("သိမ်းဆည်းပြီးပါပြီ");
        }

        function saveProfile() {
            profile.name = document.getElementById('pName').value;
            profile.code = document.getElementById('pCode').value;
            profile.wage = parseFloat(document.getElementById('pWage').value);
            profile.ot = parseFloat(document.getElementById('pOt').value);
            localStorage.setItem('f_prof', JSON.stringify(profile));
            syncToFirebase();
            alert("Updated!");
        }

        function logout() {
            auth.signOut().then(() => {
                localStorage.clear();
                location.reload();
            });
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'rewards') updateRewardUI();
        }

        function step(id, val) {
            const el = document.getElementById(id);
            el.value = (parseFloat(el.value) + val).toFixed(1);
        }

        function updateRewardUI() {
            document.getElementById('pointsDisplay').innerText = profile.points + " Points";
            document.getElementById('checkinDays').innerText = profile.checkinDays;
            document.getElementById('checkinProgressBar').style.width = ((profile.checkinDays/30)*100) + '%';
        }

        window.onload = () => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    document.getElementById('loginModal').style.display = 'none';
                    document.getElementById('userEmail').innerText = user.email;
                    document.getElementById('headName').innerText = profile.name;
                    document.getElementById('headCode').innerText = "CODE: " + profile.code;
                } else {
                    document.getElementById('loginModal').style.display = 'flex';
                }
            });
            document.getElementById('iDate').valueAsDate = new Date();
        };
    </script>
</body>
</html>
