<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Wage Tracker</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .app-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 20px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .content { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; color: white; text-align: center; }
        .btn-google { padding: 15px 30px; background: white; color: #4285f4; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .status-msg { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="app-header">
        <h2 id="headName">Daily Wage</h2>
        <p id="headCode">Loading...</p>
    </div>

    <div class="content">
        <div class="card">
            <h3>ဝင်ငွေထည့်ရန်</h3>
            <input type="date" id="iDate" style="width:100%; padding:10px; margin:10px 0;">
            <button class="btn-save" onclick="saveData()">သိမ်းဆည်းမည်</button>
        </div>

        <div class="card">
            <h3>Profile</h3>
            <p>Gmail: <span id="userEmail">...</span></p>
            <button onclick="logout()" style="background:#ef4444; color:white; border:none; padding:10px; border-radius:5px; margin-top:10px;">Logout ထွက်မည်</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div>
            <h2>Daily Wage App</h2>
            <p>အသုံးပြုရန် Google နဲ့ အရင်ဝင်ပေးပါ</p>
            <button class="btn-google" onclick="loginWithGoogle()">Sign in with Google</button>
            <p id="errorLog" style="color: #ff4d4d; margin-top: 10px; font-size: 12px;"></p>
        </div>
    </div>

    <script>
        // ခင်ဗျားရဲ့ Firebase Config (seafood-oder)
        const firebaseConfig = {
            apiKey: "AIzaSyD7T7WZg0fLGTw6ShqDHjOva-btNF6O1AM",
            authDomain: "seafood-oder.firebaseapp.com",
            databaseURL: "https://seafood-oder-default-rtdb.firebaseio.com",
            projectId: "seafood-oder",
            storageBucket: "seafood-oder.firebasestorage.app",
            messagingSenderId: "428949391732",
            appId: "1:428949391732:web:6aa0a31a4f4ba33765c421"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();

        function loginWithGoogle() {
            auth.signInWithRedirect(provider);
        }

        // Login ဝင်ပြီး ပြန်ရောက်လာတဲ့အခါ စစ်ဆေးတာ
        auth.getRedirectResult().then((result) => {
            if (result.user) {
                console.log("Logged in:", result.user.email);
            }
        }).catch((error) => {
            console.error("Login Error:", error);
            alert("Login Error: " + error.message);
            document.getElementById('errorLog').innerText = error.message;
        });

        // Auth State ပြောင်းလဲမှုကို စောင့်ကြည့်တာ
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('headName').innerText = user.displayName;
                
                const safeCode = user.email.split('@')[0].replace(/\./g, "_");
                document.getElementById('headCode').innerText = "ID: " + safeCode;

                // Firebase ကနေ User Data ဆွဲယူမယ်
                db.ref('users/' + safeCode + '/profile').once('value').then(snap => {
                    if (snap.exists()) {
                        console.log("Profile data loaded");
                    } else {
                        // User အသစ်ဆိုရင် အခြေခံ Data သွင်းထားမယ်
                        db.ref('users/' + safeCode + '/profile').set({
                            name: user.displayName,
                            email: user.email,
                            createdAt: new Date().toISOString()
                        });
                    }
                });

            } else {
                document.getElementById('loginModal').style.display = 'flex';
            }
        });

        function saveData() {
            const user = auth.currentUser;
            if (!user) return alert("အရင် Login ဝင်ပါ");
            
            const date = document.getElementById('iDate').value;
            const safeCode = user.email.split('@')[0].replace(/\./g, "_");
            
            db.ref('users/' + safeCode + '/records').push({
                date: date,
                timestamp: Date.now()
            }).then(() => {
                alert("သိမ်းဆည်းပြီးပါပြီ");
            }).catch(err => {
                alert("Error: " + err.message);
            });
        }

        function logout() {
            auth.signOut().then(() => {
                location.reload();
            });
        }

        window.onload = () => {
            document.getElementById('iDate').valueAsDate = new Date();
        };
    </script>
</body>
</html>
